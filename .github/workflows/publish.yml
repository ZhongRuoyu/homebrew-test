name: brew pr-pull

on:
  pull_request_target:
    # zizmor: ignore[dangerous-triggers] We need write permissions here.
    types:
      - labeled

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions: {}

defaults:
  run:
    shell: bash -xeuo pipefail {0}

env:
  GH_REPO: ${{ github.repository }}
  PR: ${{ github.event.pull_request.number }}

jobs:
  pr-pull:
    if: contains(github.event.pull_request.labels.*.name, 'pr-pull')
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/homebrew/brew:main # zizmor: ignore[unpinned-images]
    permissions:
      actions: read
      artifact-metadata: write
      attestations: write
      checks: read
      contents: write
      id-token: write
      issues: read
      packages: write
      pull-requests: write
    defaults:
      run:
        working-directory: /github/home
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main # zizmor: ignore[unpinned-uses]

      - name: Set up git
        uses: Homebrew/actions/git-user-config@main # zizmor: ignore[unpinned-uses]
        with:
          username: zhongruoyu-commit-app[bot]

      - name: Checkout PR branch
        working-directory: ${{ steps.set-up-homebrew.outputs.repository-path }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr checkout "$PR"

      - name: Pull bottles
        id: brew-pr-pull
        working-directory: ${{ steps.set-up-homebrew.outputs.repository-path }}
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ github.token }}
          HOMEBREW_GITHUB_PACKAGES_TOKEN: ${{ github.token }}
          HOMEBREW_GITHUB_PACKAGES_USER: ${{ github.repository_owner }}
        run: |
          brew pr-pull \
            --debug \
            --clean \
            --no-cherry-pick \
            --tap="$GH_REPO" \
            --workflows=tests.yml \
            --retain-bottle-dir \
            "$PR"
          echo "head_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Generate build provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: ${{ steps.brew-pr-pull.outputs.bottle_path }}/*.tar.gz

      - name: Generate push token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ vars.ZHONGRUOYU_COMMIT_APP_ID }}
          private-key: ${{ secrets.ZHONGRUOYU_COMMIT_APP_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Push commits
        uses: Homebrew/actions/git-try-push@main # zizmor: ignore[unpinned-uses]
        with:
          token: ${{ steps.app-token.outputs.token }}
          directory: ${{ steps.set-up-homebrew.outputs.repository-path }}
          branch: ${{ github.head_ref }}

      - name: Remove pr-pull label on failure
        if: failure()
        working-directory: ${{ steps.set-up-homebrew.outputs.repository-path }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr edit --remove-label="pr-pull" "$PR"

      - name: Add CI-published-bottle-commits label
        working-directory: ${{ steps.set-up-homebrew.outputs.repository-path }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr edit --add-label="CI-published-bottle-commits" "$PR"

      - name: Wait until PR branch is in sync with local repository
        working-directory: ${{ steps.set-up-homebrew.outputs.repository-path }}
        env:
          EXPECTED_SHA: ${{ steps.brew-pr-pull.outputs.head_sha }}
        run: |
          max_attempts=10
          attempt=0
          timeout=1

          # Wait (with exponential backoff) until the PR branch is in sync
          while [[ "$attempt" -lt "$max_attempts" ]]
          do
            remote_head="$(git ls-remote origin "pull/$PR/head" | cut -f1)"
            if [[ "$remote_head" = "$EXPECTED_SHA" ]]
            then
              success=1
              break
            fi
            echo "Remote repository not in sync. Checking again in ${timeout}s..."
            sleep "$timeout"
            attempt=$(( attempt + 1 ))
            timeout=$(( timeout * 2 ))
          done

          if [[ -z "$success" ]] &&
             [[ "$(git ls-remote origin "pull/$PR/head" | cut -f1)" != "$EXPECTED_SHA" ]]
          then
            echo "::error::Remote repository is not in sync with local repository."
            exit 1
          fi

      - name: Enable automerge
        working-directory: ${{ steps.set-up-homebrew.outputs.repository-path }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          EXPECTED_SHA: ${{ steps.brew-pr-pull.outputs.head_sha }}
        run: |
          gh pr merge \
            --auto \
            --merge \
            --delete-branch \
            --match-head-commit="$EXPECTED_SHA" \
            "$PR"
